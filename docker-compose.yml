services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: report-builder-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-report_builder}
      MYSQL_USER: ${MYSQL_USER:-report_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-reportpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-network

  # Next.js Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: report-builder-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: mysql://${MYSQL_USER:-report_user}:${MYSQL_PASSWORD:-reportpassword}@mysql:3306/${MYSQL_DATABASE:-report_builder}

      # Security & Auth
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # Application
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - report-network
    # Uncomment to allow reading from stdin (for interactive debugging)
    # stdin_open: true
    # tty: true

volumes:
  mysql_data:
    driver: local

networks:
  report-network:
    driver: bridge
